<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<style>
  body {
    background: #0f172a;
    color: white;
    font-family: Arial;
    display: flex;
    justify-content: center;
    margin-top: 100px;
  }

  .map {
    position: relative;
    width: 600px;
  }

  /* LINE LAYER */
  svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 120px;
    pointer-events: none;
  }

  /* NODE ROW */
  .row {
    display: flex;
    justify-content: space-around;
    position: relative;
  }

  /* CIRCLES */
  .node {
    width: 90px;
    height: 90px;
    background: #3b82f6;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: 0.2s;
  }

  .node:hover {
    transform: scale(1.15);
    background: #22c55e;
  }

  /* TOOLTIP */
  .tooltip {
    position: absolute;
    top: -65px;
    left: 50%;
    transform: translateX(-50%);
    background: #111827;
    padding: 6px;
    border-radius: 6px;
    font-size: 12px;
    opacity: 0;
    transition: 0.2s;
    white-space: nowrap;
  }

  .node:hover .tooltip {
    opacity: 1;
  }

  img {
    width: 75%;
  }

</style>
</head>
<body>

<div class="map">

  <!-- SVG connections -->
  <svg id="lines"></svg>

  <!-- Nodes -->
  <div class="row" id="nodes">
    <div class="node" id="embryon">
      <img alt="S0" src="./resources/embryon_icon.png">
      <div class="tooltip"><b>Embryon</b><br/>Initial state</div>
    </div>

    <div class="node" id="input1">
      I1
      <div class="tooltip"><b>Input 1</b><br/>First data</div>
    </div>

    <div class="node" id="input2">
      I2
      <div class="tooltip"><b>Input 2</b><br/>Second data</div>
    </div>
  </div>

</div>

<script>
  const connections = [
    ["embryon", "input1"],
    ["embryon", "input2"]
  ];

  const svg = document.getElementById("lines");

  function drawLines() {
    svg.innerHTML = "";

    connections.forEach(([a, b]) => {
      const el1 = document.getElementById(a);
      const el2 = document.getElementById(b);

      const rect1 = el1.getBoundingClientRect();
      const rect2 = el2.getBoundingClientRect();

      const parentRect = document.querySelector(".map").getBoundingClientRect();

      const x1 = rect1.left + rect1.width / 2 - parentRect.left;
      const y1 = rect1.top + rect1.height / 2 - parentRect.top;

      const x2 = rect2.left + rect2.width / 2 - parentRect.left;
      const y2 = rect2.top + rect2.height / 2 - parentRect.top;

      const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
      line.setAttribute("x1", x1);
      line.setAttribute("y1", y1);
      line.setAttribute("x2", x2);
      line.setAttribute("y2", y2);
      line.setAttribute("stroke", "#94a3b8");
      line.setAttribute("stroke-width", "2");

      svg.appendChild(line);
    });
  }

  window.addEventListener("load", drawLines);
  window.addEventListener("resize", drawLines);
</script>

</body>
</html>
